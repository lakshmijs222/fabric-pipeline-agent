<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect width="1100" height="800" rx="18" fill="#0d1117"/>
  <text x="550" y="48" fill="#f0f6fc" font-size="28" font-weight="800" text-anchor="middle">Self-Healing Fabric Pipelines</text>
  <text x="550" y="74" fill="#8b949e" font-size="14" text-anchor="middle">Autonomous L1 agent:  detect &#8594; diagnose (Claude + RAG) &#8594; auto-heal &#8594; verify &#8594; escalate</text>

  <!-- ===================== EXTERNAL LAYER ===================== -->
  <text x="55" y="118" fill="#58a6ff" font-size="13" font-weight="700" letter-spacing="1">EXTERNAL SYSTEMS</text>

  <g>
    <rect x="55" y="130" width="210" height="62" rx="9" fill="#10243e" stroke="#388bfd" stroke-width="1.5"/>
    <text x="160" y="158" fill="#58a6ff" font-size="14" font-weight="700" text-anchor="middle">Azure AD</text>
    <text x="160" y="178" fill="#8b949e" font-size="11" text-anchor="middle">OAuth2 token</text>

    <rect x="300" y="130" width="210" height="62" rx="9" fill="#10243e" stroke="#388bfd" stroke-width="1.5"/>
    <text x="405" y="158" fill="#58a6ff" font-size="14" font-weight="700" text-anchor="middle">Microsoft Fabric</text>
    <text x="405" y="178" fill="#8b949e" font-size="11" text-anchor="middle">REST API (pipelines)</text>

    <rect x="585" y="130" width="210" height="62" rx="9" fill="#10243e" stroke="#388bfd" stroke-width="1.5"/>
    <text x="690" y="158" fill="#58a6ff" font-size="14" font-weight="700" text-anchor="middle">Anthropic Claude</text>
    <text x="690" y="178" fill="#8b949e" font-size="11" text-anchor="middle">diagnosis (LLM)</text>

    <rect x="835" y="130" width="210" height="62" rx="9" fill="#10243e" stroke="#388bfd" stroke-width="1.5"/>
    <text x="940" y="158" fill="#58a6ff" font-size="14" font-weight="700" text-anchor="middle">Microsoft Teams</text>
    <text x="940" y="178" fill="#8b949e" font-size="11" text-anchor="middle">webhook alerts</text>
  </g>

  <!-- external <-> bot arrows -->
  <line x1="160" y1="250" x2="160" y2="196" stroke="#8b949e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="405" y1="250" x2="405" y2="196" stroke="#8b949e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="690" y1="250" x2="690" y2="196" stroke="#8b949e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="940" y1="250" x2="940" y2="196" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <g font-size="10" fill="#6e7681" text-anchor="middle">
    <rect x="138" y="214" width="44" height="15" rx="3" fill="#0d1117"/><text x="160" y="225">token</text>
    <rect x="368" y="214" width="74" height="15" rx="3" fill="#0d1117"/><text x="405" y="225">runs / rerun</text>
    <rect x="660" y="214" width="60" height="15" rx="3" fill="#0d1117"/><text x="690" y="225">diagnose</text>
    <rect x="918" y="214" width="44" height="15" rx="3" fill="#0d1117"/><text x="940" y="225">alerts</text>
  </g>

  <!-- ===================== BOT LAYER ===================== -->
  <rect x="40" y="250" width="1020" height="215" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="60" y="278" fill="#56d364" font-size="13" font-weight="700" letter-spacing="1">L1 SUPPORT AGENT &#183; always-on process</text>

  <g>
    <rect x="60" y="300" width="150" height="120" rx="9" fill="#0d2a18" stroke="#3fb950" stroke-width="1.5"/>
    <text x="135" y="352" fill="#56d364" font-size="13" font-weight="700" text-anchor="middle">L1 Bot</text>
    <text x="135" y="372" fill="#8b949e" font-size="10" text-anchor="middle">polling loop</text>

    <rect x="225" y="300" width="150" height="120" rx="9" fill="#0d2a18" stroke="#3fb950" stroke-width="1.5"/>
    <text x="300" y="352" fill="#56d364" font-size="13" font-weight="700" text-anchor="middle">Fabric Client</text>
    <text x="300" y="372" fill="#8b949e" font-size="10" text-anchor="middle">REST + token</text>

    <rect x="390" y="300" width="150" height="120" rx="9" fill="#0d2a18" stroke="#3fb950" stroke-width="1.5"/>
    <text x="465" y="352" fill="#56d364" font-size="13" font-weight="700" text-anchor="middle">Diagnoser</text>
    <text x="465" y="372" fill="#8b949e" font-size="10" text-anchor="middle">Claude + RAG</text>

    <rect x="555" y="300" width="150" height="120" rx="9" fill="#0d2a18" stroke="#3fb950" stroke-width="1.5"/>
    <text x="630" y="352" fill="#56d364" font-size="13" font-weight="700" text-anchor="middle">Auto-Healer</text>
    <text x="630" y="372" fill="#8b949e" font-size="10" text-anchor="middle">rerun + verify</text>

    <rect x="720" y="300" width="150" height="120" rx="9" fill="#0d2a18" stroke="#3fb950" stroke-width="1.5"/>
    <text x="795" y="352" fill="#56d364" font-size="13" font-weight="700" text-anchor="middle">Knowledge</text>
    <text x="795" y="368" fill="#56d364" font-size="13" font-weight="700" text-anchor="middle">Base</text>
    <text x="795" y="388" fill="#8b949e" font-size="10" text-anchor="middle">RAG search</text>

    <rect x="885" y="300" width="150" height="120" rx="9" fill="#0d2a18" stroke="#3fb950" stroke-width="1.5"/>
    <text x="960" y="352" fill="#56d364" font-size="13" font-weight="700" text-anchor="middle">Teams</text>
    <text x="960" y="368" fill="#56d364" font-size="13" font-weight="700" text-anchor="middle">Notifier</text>
    <text x="960" y="388" fill="#8b949e" font-size="10" text-anchor="middle">Adaptive Cards</text>
  </g>

  <!-- ===================== STORAGE + UI LAYER ===================== -->
  <text x="55" y="512" fill="#b392f0" font-size="13" font-weight="700" letter-spacing="1">STATE / STORAGE &amp; UI</text>

  <!-- audit log -->
  <rect x="55" y="525" width="230" height="64" rx="9" fill="#241a3a" stroke="#8957e5" stroke-width="1.5"/>
  <text x="170" y="553" fill="#b392f0" font-size="14" font-weight="700" text-anchor="middle">audit.jsonl</text>
  <text x="170" y="573" fill="#8b949e" font-size="11" text-anchor="middle">every action logged</text>

  <!-- chroma -->
  <rect x="680" y="525" width="230" height="64" rx="9" fill="#241a3a" stroke="#8957e5" stroke-width="1.5"/>
  <text x="795" y="553" fill="#b392f0" font-size="14" font-weight="700" text-anchor="middle">ChromaDB</text>
  <text x="795" y="573" fill="#8b949e" font-size="11" text-anchor="middle">runbooks + incidents (vectors)</text>

  <!-- dashboard -->
  <rect x="350" y="640" width="400" height="70" rx="10" fill="#10243e" stroke="#388bfd" stroke-width="2"/>
  <text x="550" y="670" fill="#58a6ff" font-size="16" font-weight="800" text-anchor="middle">Streamlit Dashboard</text>
  <text x="550" y="692" fill="#8b949e" font-size="11" text-anchor="middle">KPIs &#183; failure cards &#183; IST &#183; date slicer &#183; public demo URL</text>

  <!-- storage arrows -->
  <line x1="135" y1="465" x2="135" y2="525" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="113" y="488" width="44" height="15" rx="3" fill="#0d1117"/><text x="135" y="499" font-size="10" fill="#6e7681" text-anchor="middle">write</text>

  <line x1="795" y1="465" x2="795" y2="525" stroke="#8b949e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <rect x="773" y="488" width="48" height="15" rx="3" fill="#0d1117"/><text x="795" y="499" font-size="10" fill="#6e7681" text-anchor="middle">vectors</text>

  <line x1="170" y1="589" x2="430" y2="640" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="270" y="606" width="48" height="15" rx="3" fill="#0d1117"/><text x="294" y="617" font-size="10" fill="#6e7681" text-anchor="middle">reads</text>

  <!-- footer legend -->
  <g font-size="11" fill="#6e7681">
    <rect x="55" y="745" width="14" height="14" rx="3" fill="#10243e" stroke="#388bfd"/><text x="76" y="756">External / UI</text>
    <rect x="190" y="745" width="14" height="14" rx="3" fill="#0d2a18" stroke="#3fb950"/><text x="211" y="756">Agent components</text>
    <rect x="360" y="745" width="14" height="14" rx="3" fill="#241a3a" stroke="#8957e5"/><text x="381" y="756">Storage</text>
  </g>
</svg>
